<body>
    <!-- 安卓APP标准尺寸预览容器 -->
    <div class="app-container">
        <!-- 状态栏 -->
        <div class="status-bar">
            <div>9:41</div>
            <div class="status-bar-right">
                <div>●●●</div>
                <div>📶</div>
                <div>🔋</div>
            </div>
        </div>
        
        <!-- 标题栏 -->
        <div class="header">
            <div class="header-title">通讯录</div>

            </div>
        </div>
        
        <!-- 搜索栏 -->

        </div>

        <div class="scrollable-content">

                    <div style="display: flex; flex-direction: column; align-items: center; min-width: 60px;">
                        <div class="list-item-avatar" style="width: 60px; height: 60px; margin-bottom: var(--spacing-xs);">
                            <img src="images/avatar.svg" alt="用户头像" class="default-avatar">
                        </div>
                        <div style="font-size: var(--font-size-xs); color: var(--text-primary); text-align: center;">张三</div>
                    </div>

                        </div>
                        <div style="font-size: var(--font-size-xs); color: var(--text-primary); text-align: center;">赵六</div>
                    </div>
                </div>

                    <div class="list-item-content">
                        <div class="list-item-title">阿东</div>
